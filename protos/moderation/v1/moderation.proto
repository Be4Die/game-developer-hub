syntax = "proto3";

package moderation.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service ModerationService {
  rpc SubmitForReview(SubmitForReviewRequest) returns (SubmitForReviewResponse) {
    option (google.api.http) = {
      post: "/api/v1/moderation/games/{game_id}/submit"
      body: "*"
    };
  }

  rpc GetModerationStatus(GetModerationStatusRequest) returns (GetModerationStatusResponse) {
    option (google.api.http) = {
      get: "/api/v1/moderation/games/{game_id}/status"
    };
  }

  rpc ListPendingGames(ListPendingGamesRequest) returns (ListPendingGamesResponse) {
    option (google.api.http) = {
      get: "/api/v1/moderation/pending"
    };
  }

  rpc ApproveGame(ApproveGameRequest) returns (ApproveGameResponse) {
    option (google.api.http) = {
      post: "/api/v1/moderation/games/{game_id}/approve"
      body: "*"
    };
  }

  rpc RejectGame(RejectGameRequest) returns (RejectGameResponse) {
    option (google.api.http) = {
      post: "/api/v1/moderation/games/{game_id}/reject"
      body: "*"
    };
  }
}

enum ModerationStatus {
  MODERATION_STATUS_UNSPECIFIED = 0;
  MODERATION_STATUS_PENDING = 1;
  MODERATION_STATUS_APPROVED = 2;
  MODERATION_STATUS_REJECTED = 3;
}

message GameModeration {
  int64 id = 1;
  int64 game_id = 2;
  string developer_id = 3;
  string game_name = 4;
  string game_description = 5;
  string moderator_id = 6;
  ModerationStatus status = 7;
  string rejection_reason = 8;
  google.protobuf.Timestamp submitted_at = 9;
  google.protobuf.Timestamp reviewed_at = 10;
}

message SubmitForReviewRequest {
  int64 game_id = 1;
  string game_name = 2;
  string game_description = 3;
}

message SubmitForReviewResponse {
  GameModeration moderation = 1;
}

message GetModerationStatusRequest {
  int64 game_id = 1;
}

message GetModerationStatusResponse {
  GameModeration moderation = 1;
}

message ListPendingGamesRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListPendingGamesResponse {
  repeated GameModeration moderations = 1;
  int32 total_count = 2;
}

message ApproveGameRequest {
  int64 game_id = 1;
}

message ApproveGameResponse {
  GameModeration moderation = 1;
}

message RejectGameRequest {
  int64 game_id = 1;
  string reason = 2;
}

message RejectGameResponse {
  GameModeration moderation = 1;
}
