syntax = "proto3";

package sso.v1;

import "google/api/annotations.proto";
import "sso/v1/common.proto";

// Сервис управления профилем пользователя.
service UserService {
  // Получение профиля текущего пользователя (по JWT).
  rpc GetProfile(UserServiceGetProfileRequest) returns (UserServiceGetProfileResponse) {
    option (google.api.http) = {get: "/api/v1/users/profile"};
  }

  // Обновление профиля текущего пользователя.
  rpc UpdateProfile(UserServiceUpdateProfileRequest) returns (UserServiceUpdateProfileResponse) {
    option (google.api.http) = {
      patch: "/api/v1/users/profile"
      body: "*"
    };
  }

  // Смена пароля (требует текущий пароль).
  rpc ChangePassword(UserServiceChangePasswordRequest) returns (UserServiceChangePasswordResponse) {
    option (google.api.http) = {
      post: "/api/v1/users/profile:change-password"
      body: "*"
    };
  }

  // Получение профиля другого пользователя по ID.
  // Доступно для модераторов и администраторов.
  rpc Get(UserServiceGetRequest) returns (UserServiceGetResponse) {
    option (google.api.http) = {get: "/api/v1/users/{user_id}"};
  }

  // Поиск пользователей по email или display_name.
  // Доступно для модераторов и администраторов.
  rpc Search(UserServiceSearchRequest) returns (UserServiceSearchResponse) {
    option (google.api.http) = {get: "/api/v1/users"};
  }

  // Изменение роли пользователя.
  // Доступно только администраторам.
  rpc ChangeRole(UserServiceChangeRoleRequest) returns (UserServiceChangeRoleResponse) {
    option (google.api.http) = {
      patch: "/api/v1/users/{user_id}:change-role"
      body: "*"
    };
  }

  // Блокировка/разблокировка пользователя.
  // Доступно только администраторам.
  rpc SetStatus(UserServiceSetStatusRequest) returns (UserServiceSetStatusResponse) {
    option (google.api.http) = {
      patch: "/api/v1/users/{user_id}:set-status"
      body: "*"
    };
  }
}

message UserServiceGetProfileRequest {
  // Извлекается из JWT, поле может быть пустым.
  string user_id = 1;
}

message UserServiceGetProfileResponse {
  User user = 1;
}

message UserServiceUpdateProfileRequest {
  optional string display_name = 1;
}

message UserServiceUpdateProfileResponse {
  User user = 1;
}

message UserServiceChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message UserServiceChangePasswordResponse {
  bool success = 1;
}

message UserServiceGetRequest {
  string user_id = 1;
}

message UserServiceGetResponse {
  User user = 1;
}

message UserServiceSearchRequest {
  // Поисковый запрос (совпадение по email или display_name).
  string query = 1;
  // Лимит результатов (по умолчанию 20, максимум 100).
  optional int32 limit = 2;
  // Смещение для пагинации.
  optional int32 offset = 3;
}

message UserServiceSearchResponse {
  repeated User users = 1;
  int64 total_count = 2;
}

message UserServiceChangeRoleRequest {
  string user_id = 1;
  UserRole new_role = 2;
}

message UserServiceChangeRoleResponse {
  User user = 1;
}

message UserServiceSetStatusRequest {
  string user_id = 1;
  UserStatus new_status = 2;
}

message UserServiceSetStatusResponse {
  User user = 1;
}
