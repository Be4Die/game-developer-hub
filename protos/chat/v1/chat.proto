syntax = "proto3";

package chat.v1;

import "google/api/annotations.proto";

service ChatService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse) {
    option (google.api.http) = {
      post: "/api/v1/chat/messages"
      body: "*"
    };
  }

  rpc GetConversations(GetConversationsRequest) returns (GetConversationsResponse) {
    option (google.api.http) = {
      get: "/api/v1/chat/conversations"
    };
  }

  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse) {
    option (google.api.http) = {
      get: "/api/v1/chat/conversations/{conversation_id}/messages"
    };
  }

  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse) {
    option (google.api.http) = {
      post: "/api/v1/chat/conversations/{conversation_id}/read"
      body: "*"
    };
  }

  rpc GetUnreadCount(GetUnreadCountRequest) returns (GetUnreadCountResponse) {
    option (google.api.http) = {
      get: "/api/v1/chat/unread"
    };
  }

  rpc CreateConversation(CreateConversationRequest) returns (CreateConversationResponse) {
    option (google.api.http) = {
      post: "/api/v1/chat/conversations"
      body: "*"
    };
  }
}

message Conversation {
  string id = 1;
  string participant_id = 2;
  string participant_name = 3;
  string last_message = 4;
  int64 last_message_at = 5;
  int32 unread_count = 6;
}

message Message {
  string id = 1;
  string conversation_id = 2;
  string sender_id = 3;
  string sender_name = 4;
  string sender_role = 8;
  string content = 5;
  int64 created_at = 6;
  bool is_read = 7;
}

message SendMessageRequest {
  string conversation_id = 1;
  string content = 2;
}

message SendMessageResponse {
  Message message = 1;
}

message GetConversationsRequest {}

message GetConversationsResponse {
  repeated Conversation conversations = 1;
}

message GetMessagesRequest {
  string conversation_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetMessagesResponse {
  repeated Message messages = 1;
  int32 total = 2;
}

message MarkAsReadRequest {
  string conversation_id = 1;
}

message MarkAsReadResponse {}

message GetUnreadCountRequest {}

message GetUnreadCountResponse {
  int32 total_unread = 1;
}

message CreateConversationRequest {
  string participant_id = 1;
  string participant_name = 2;
}

message CreateConversationResponse {
  Conversation conversation = 1;
}
