syntax = "proto3";

package orchestrator.v1;

import "google/api/annotations.proto";
import "orchestrator/v1/common.proto";

// Сервис обнаружения серверов для клиентов игр.
service DiscoveryService {
  // Обнаружить доступные серверы для подключения.
  rpc DiscoveryServiceDiscover(DiscoveryServiceDiscoverRequest) returns (DiscoveryServiceDiscoverResponse) {
    option (google.api.http) = {get: "/api/v1/games/{game_id}/discover"};
  }
}

message DiscoveryServiceDiscoverRequest {
  int64 game_id = 1;
}

message DiscoveryServiceDiscoverResponse {
  repeated ServerEndpoint servers = 1;
}
