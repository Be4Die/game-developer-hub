syntax = "proto3";

package orchestrator.v1;

import "google/api/annotations.proto";
import "orchestrator/v1/common.proto";

// Сервис управления вычислительными нодами.
service NodeService {
  // Подключить вычислительную ноду.
  rpc Register(NodeServiceRegisterRequest) returns (NodeServiceRegisterResponse) {
    option (google.api.http) = {
      post: "/api/v1/nodes"
      body: "*"
    };
  }

  // Список всех нод.
  rpc List(NodeServiceListRequest) returns (NodeServiceListResponse) {
    option (google.api.http) = {get: "/api/v1/nodes"};
  }

  // Информация о ноде.
  rpc Get(NodeServiceGetRequest) returns (NodeServiceGetResponse) {
    option (google.api.http) = {get: "/api/v1/nodes/{node_id}"};
  }

  // Удалить ноду.
  rpc Delete(NodeServiceDeleteRequest) returns (NodeServiceDeleteResponse) {
    option (google.api.http) = {delete: "/api/v1/nodes/{node_id}"};
  }

  // Потребление ресурсов ноды.
  rpc GetUsage(NodeServiceGetUsageRequest) returns (NodeServiceGetUsageResponse) {
    option (google.api.http) = {get: "/api/v1/nodes/{node_id}/usage"};
  }
}

// ─── Register ───────────────────────────────────────────────────────────────

message RegisterNodeManual {
  string address = 1;
  string token = 2;
  optional string region = 3;
}

message RegisterNodeAuthorize {
  int64 node_id = 1;
  string token = 2;
}

message NodeServiceRegisterRequest {
  oneof mode {
    RegisterNodeManual manual = 1;
    RegisterNodeAuthorize authorize = 2;
  }
}

message NodeServiceRegisterResponse {
  Node node = 1;
}

// ─── List ───────────────────────────────────────────────────────────────────

message NodeServiceListRequest {
  optional NodeStatus status = 1;
}

message NodeServiceListResponse {
  repeated Node nodes = 1;
}

// ─── Get ────────────────────────────────────────────────────────────────────

message NodeServiceGetRequest {
  int64 node_id = 1;
}

message NodeServiceGetResponse {
  Node node = 1;
}

// ─── Delete ─────────────────────────────────────────────────────────────────

message NodeServiceDeleteRequest {
  int64 node_id = 1;
}

message NodeServiceDeleteResponse {
  // Пусто — при успехе возвращается пустой ответ.
}

// ─── GetUsage ───────────────────────────────────────────────────────────────

message NodeServiceGetUsageRequest {
  int64 node_id = 1;
}

message NodeServiceGetUsageResponse {
  int64 node_id = 1;
  ResourceUsage usage = 2;
  int32 active_instance_count = 3;
}
