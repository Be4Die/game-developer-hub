syntax = "proto3";

package orchestrator.v1;

import "google/api/annotations.proto";
import "orchestrator/v1/common.proto";

// Сервис управления инстансами игровых серверов.
service InstanceService {
  // Запустить инстанс сервера.
  rpc Start(InstanceServiceStartRequest) returns (InstanceServiceStartResponse) {
    option (google.api.http) = {
      post: "/api/v1/games/{game_id}/instances"
      body: "*"
    };
  }

  // Список инстансов игры.
  rpc List(InstanceServiceListRequest) returns (InstanceServiceListResponse) {
    option (google.api.http) = {get: "/api/v1/games/{game_id}/instances"};
  }

  // Информация об инстансе.
  rpc Get(InstanceServiceGetRequest) returns (InstanceServiceGetResponse) {
    option (google.api.http) = {get: "/api/v1/games/{game_id}/instances/{instance_id}"};
  }

  // Остановить инстанс.
  rpc Stop(InstanceServiceStopRequest) returns (InstanceServiceStopResponse) {
    option (google.api.http) = {
      post: "/api/v1/games/{game_id}/instances/{instance_id}:stop"
      body: "*"
    };
  }

  // Поток журналов инстанса (server streaming) — использует SSE для HTTP.
  rpc StreamLogs(InstanceServiceStreamLogsRequest) returns (stream InstanceServiceStreamLogsResponse) {
    option (google.api.http) = {
      get: "/api/v1/games/{game_id}/instances/{instance_id}/logs"
    };
  }

  // Потребление ресурсов инстанса.
  rpc GetUsage(InstanceServiceGetUsageRequest) returns (InstanceServiceGetUsageResponse) {
    option (google.api.http) = {get: "/api/v1/games/{game_id}/instances/{instance_id}/usage"};
  }
}

// ─── Start ──────────────────────────────────────────────────────────────────

message InstanceServiceStartRequest {
  int64 game_id = 1;
  string build_version = 2;
  optional string name = 3;
  optional PortAllocation port_allocation = 4;
  optional ResourceLimits resource_limits = 5;
  map<string, string> env_vars = 6;
  repeated string args = 7;
  map<string, string> developer_payload = 8;
  optional uint32 max_players = 9;
}

message InstanceServiceStartResponse {
  Instance instance = 1;
}

// ─── List ───────────────────────────────────────────────────────────────────

message InstanceServiceListRequest {
  int64 game_id = 1;
  optional InstanceStatus status = 2;
}

message InstanceServiceListResponse {
  repeated Instance instances = 1;
}

// ─── Get ────────────────────────────────────────────────────────────────────

message InstanceServiceGetRequest {
  int64 game_id = 1;
  int64 instance_id = 2;
}

message InstanceServiceGetResponse {
  Instance instance = 1;
}

// ─── Stop ───────────────────────────────────────────────────────────────────

message InstanceServiceStopRequest {
  int64 game_id = 1;
  int64 instance_id = 2;
  // Таймаут остановки в секундах (0 = значение по умолчанию 30 сек).
  int32 timeout = 3;
}

message InstanceServiceStopResponse {
  Instance instance = 1;
}

// ─── StreamLogs ─────────────────────────────────────────────────────────────

message InstanceServiceStreamLogsRequest {
  int64 game_id = 1;
  int64 instance_id = 2;
  bool follow = 3;
  int32 tail = 4;
  optional int64 since_unix_nano = 5;
  optional LogSource source = 6;
}

message InstanceServiceStreamLogsResponse {
  LogEntry entry = 1;
}

// ─── GetUsage ───────────────────────────────────────────────────────────────

message InstanceServiceGetUsageRequest {
  int64 game_id = 1;
  int64 instance_id = 2;
}

message InstanceServiceGetUsageResponse {
  int64 instance_id = 1;
  ResourceUsage usage = 2;
}
