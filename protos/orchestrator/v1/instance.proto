syntax = "proto3";

package orchestrator.v1;

import "orchestrator/v1/common.proto";

// Сервис управления инстансами игровых серверов.
service InstanceService {
  // Запустить инстанс сервера.
  rpc Start(StartInstanceRequest) returns (StartInstanceResponse);

  // Список инстансов игры.
  rpc List(ListInstancesRequest) returns (ListInstancesResponse);

  // Информация об инстансе.
  rpc Get(GetInstanceRequest) returns (GetInstanceResponse);

  // Остановить инстанс.
  rpc Stop(StopInstanceRequest) returns (StopInstanceResponse);

  // Поток журналов инстанса (server streaming).
  rpc StreamLogs(StreamLogsRequest) returns (stream LogEntry);

  // Потребление ресурсов инстанса.
  rpc GetUsage(GetInstanceUsageRequest) returns (GetInstanceUsageResponse);
}

// ─── Start ──────────────────────────────────────────────────────────────────

message StartInstanceRequest {
  int64 game_id = 1;
  string build_version = 2;
  // Ручной (manual) или автоматический (auto) режим.
  string server_mode = 3;
  optional string name = 4;
  optional PortAllocation port_allocation = 5;
  optional ResourceLimits resource_limits = 6;
  map<string, string> env_vars = 7;
  repeated string args = 8;
  map<string, string> developer_payload = 9;
  optional uint32 max_players = 10;
}

message StartInstanceResponse {
  Instance instance = 1;
}

// ─── List ───────────────────────────────────────────────────────────────────

message ListInstancesRequest {
  int64 game_id = 1;
  optional InstanceStatus status = 2;
}

message ListInstancesResponse {
  repeated Instance instances = 1;
}

// ─── Get ────────────────────────────────────────────────────────────────────

message GetInstanceRequest {
  int64 game_id = 1;
  int64 instance_id = 2;
}

message GetInstanceResponse {
  Instance instance = 1;
}

// ─── Stop ───────────────────────────────────────────────────────────────────

message StopInstanceRequest {
  int64 game_id = 1;
  int64 instance_id = 2;
  // Таймаут остановки в секундах (0 = значение по умолчанию 30 сек).
  int32 timeout = 3;
}

message StopInstanceResponse {
  Instance instance = 1;
}

// ─── StreamLogs ─────────────────────────────────────────────────────────────

message StreamLogsRequest {
  int64 game_id = 1;
  int64 instance_id = 2;
  bool follow = 3;
  int32 tail = 4;
  optional int64 since_unix_nano = 5;
  optional LogSource source = 6;
}

// ─── GetUsage ───────────────────────────────────────────────────────────────

message GetInstanceUsageRequest {
  int64 game_id = 1;
  int64 instance_id = 2;
}

message GetInstanceUsageResponse {
  int64 instance_id = 1;
  ResourceUsage usage = 2;
}
