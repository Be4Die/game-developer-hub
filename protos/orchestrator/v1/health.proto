syntax = "proto3";

package orchestrator.v1;

import "google/api/annotations.proto";

// Сервис проверки работоспособности.
service HealthService {
  rpc Check(HealthServiceCheckRequest) returns (HealthServiceCheckResponse) {
    option (google.api.http) = {get: "/api/v1/health"};
  }
}

message HealthServiceCheckRequest {}

message HealthServiceCheckResponse {
  // Всегда "ok" при работоспособности.
  string status = 1;
  string version = 2;
  double uptime_seconds = 3;
}
