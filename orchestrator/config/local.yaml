env: "local"

grpc:
  port: 50052

jwt:
  secret: "dev-jwt-secret-for-local-testing"
  issuer: "sso"

db:
  host: "postgres"
  port: 5432
  user: "postgres"
  password: "postgres"
  name: "orchestrator"
  ssl_mode: "disable"
  max_conns: 25

kv:
  addr: "valkey:6379"
  password: ""
  db: 0
  key_ttl: 45s

storage:
  builds_path: "./data/builds"

grpc_client:
  timeout: 30s
  connect_timeout: 10s
  keepalive_time: 30s
  keepalive_timeout: 10s
  max_message_size: 16777216
  enable_compression: true

node_heartbeat:
  check_interval: 15s
  inactivity_timeout: 60s

limits:
  max_builds_per_game: 10
  max_instances_per_game: 50
  max_log_tail_lines: 5000
  max_build_size: 2147483648
