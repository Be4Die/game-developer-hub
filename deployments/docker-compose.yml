# ═══════════════════════════════════════════════════════════════
#  Game Developer Hub — полный стек для локальной разработки
#
#  Сервисы:
#    postgres       — БД оркестратора
#    valkey         — key-value хранилище (heartbeat нод)
#    sso-postgres   — БД SSO сервиса
#    sso-valkey     — key-value хранилище SSO
#    orchestrator   — gRPC API оркестратора
#    sso            — gRPC API аутентификации
#    gateway        — gRPC-gateway (HTTP/REST → gRPC)
#    game-server-node — gRPC-агент ноды (Docker-in-Docker)
#    frontend       — Vue SPA с nginx (production)
#
#  Использование:
#    docker compose up -d              # запустить всё
#    docker compose up -d --build      # пересобрать и запустить
#    docker compose logs -f orchestrator
#    docker compose down -v            # остановить и удалить тома
# ═══════════════════════════════════════════════════════════════

services:
  # ── Инфраструктура (Orchestrator) ────────────────────────────

  postgres:
    image: postgres:17-alpine
    container_name: gdh-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orchestrator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: gdh-valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Инфраструктура (SSO) ─────────────────────────────────────

  sso-postgres:
    image: postgres:17-alpine
    container_name: gdh-sso-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sso
    volumes:
      - sso-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  sso-valkey:
    image: valkey/valkey:8-alpine
    container_name: gdh-sso-valkey
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Сервисы приложения ──────────────────────────────────────

  orchestrator:
    build:
      context: ..
      dockerfile: orchestrator/Dockerfile
    container_name: gdh-orchestrator
    environment:
      CONFIG_PATH: /app/config/local.yaml
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - ../orchestrator/config:/app/config:ro
      - builds:/app/data/builds
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50052 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  sso:
    build:
      context: ..
      dockerfile: sso/Dockerfile
    container_name: gdh-sso
    environment:
      CONFIG_PATH: /app/config/docker.yaml
      SSO_API_KEY: dev-api-key-for-local-testing
      JWT_SECRET: dev-jwt-secret-for-local-testing
    depends_on:
      sso-postgres:
        condition: service_healthy
      sso-valkey:
        condition: service_healthy
    volumes:
      - ../sso/config:/app/config:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: gdh-gateway
    environment:
      ORCHESTRATOR_GRPC_ADDR: gdh-orchestrator:50052
      SSO_GRPC_ADDR: gdh-sso:50051
      HTTP_ADDR: :8080
    ports:
      - "8080:8080"
    depends_on:
      orchestrator:
        condition: service_healthy
      sso:
        condition: service_healthy

  game-server-node:
    build:
      context: ..
      dockerfile: game-server-node/Dockerfile
    container_name: gdh-node
    environment:
      CONFIG_PATH: /app/config/docker.yaml
      NODE_API_KEY: dev-api-key-for-local-testing
    ports:
      - "44044:44044"
    depends_on:
      orchestrator:
        condition: service_healthy
    volumes:
      - ../game-server-node/config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: gdh-frontend
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_started

volumes:
  pgdata:
  sso-pgdata:
  builds:
