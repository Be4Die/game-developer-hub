server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large build uploads (up to 2GB)
    client_max_body_size 2048m;
    client_body_timeout 300s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # SPA — все маршруты отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API через gRPC-gateway
    # Orchestrator: /api/orchestrator/v1/...
    # SSO Auth:     /api/v1/auth/...
    # SSO User:     /api/v1/users/...
    # SSO Token:    /api/v1/tokens/...
    location /api/ {
        proxy_pass http://gdh-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (логи инстансов)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    # Статика — кеширование
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
