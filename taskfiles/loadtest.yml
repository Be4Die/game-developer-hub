version: "3"

vars:
  LOAD_TEST_DIR: "."
  LOAD_TEST_ADDR: "localhost:44044"
  LOAD_TEST_CONCURRENCY: 50
  LOAD_TEST_REQUESTS: 10000

tasks:
  run:
    desc: "Run load tests against DiscoveryService"
    dir: "{{.LOAD_TEST_DIR}}"
    cmds:
      - >
        go run ./cmd/load-test
        --addr {{.LOAD_TEST_ADDR}}
        --concurrency {{.LOAD_TEST_CONCURRENCY}}
        --requests {{.LOAD_TEST_REQUESTS}}

  heavy:
    desc: "Run heavy load tests (100 concurrency, 50000 requests)"
    dir: "{{.LOAD_TEST_DIR}}"
    cmds:
      - go run ./cmd/load-test --addr {{.LOAD_TEST_ADDR}} --concurrency 100 --requests 50000
