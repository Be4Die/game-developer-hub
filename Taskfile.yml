version: "3"

vars:
  NODE_IMAGE_NAME: "game-server-node"
  NODE_IMAGE_TAG: "latest"
  NODE_CONTAINER_NAME: "game-server-node"
  NODE_GRPC_PORT: 44044
  NODE_CONFIG: "local.yaml"

tasks:
  # ==================== Proto ====================
  proto:
    desc: "Generate Go code from proto files"
    dir: protos
    cmds:
      - task: proto:clean
      - buf generate

  proto:lint:
    desc: "Lint proto files"
    dir: protos
    cmds:
      - buf lint

  proto:clean:
    desc: "Clean generated proto files"
    dir: protos
    cmds:
      - cmd: powershell -Command "Get-ChildItem -Recurse -Filter '*.pb.go' | Remove-Item -Force"
        platforms: [windows]
      - cmd: find . -name "*.pb.go" -type f -delete
        platforms: [linux, darwin]

  # ==================== Docker: build ====================
  node:build:
    desc: "Build Docker image for game-server-node"
    cmds:
      - docker build
        -t {{.NODE_IMAGE_NAME}}:{{.NODE_IMAGE_TAG}}
        -f game-server-node/Dockerfile
        .

  # ==================== Docker: run background ====================
  node:up:
    desc: "Run game-server-node container in background"
    deps: [node:build]
    cmds:
      - docker run
        --name {{.NODE_CONTAINER_NAME}}
        -d
        --restart unless-stopped
        -p {{.NODE_GRPC_PORT}}:{{.NODE_GRPC_PORT}}
        -v //var/run/docker.sock:/var/run/docker.sock
        -e CONFIG_PATH=/app/config/{{.NODE_CONFIG}}
        {{.NODE_IMAGE_NAME}}:{{.NODE_IMAGE_TAG}}

  # ==================== Docker: stop ====================
  node:down:
    desc: "Stop and remove game-server-node container"
    cmds:
      - docker stop {{.NODE_CONTAINER_NAME}}
      - docker rm {{.NODE_CONTAINER_NAME}}
    ignore_error: true

  # ==================== Docker: logs ====================
  node:logs:
    desc: "Show game-server-node container logs"
    cmds:
      - docker logs -f {{.NODE_CONTAINER_NAME}}

  # ==================== Docker: restart ====================
  node:restart:
    desc: "Restart game-server-node container"
    cmds:
      - task: node:down
      - task: node:up

  # ==================== Docker: shell ====================
  node:shell:
    desc: "Open shell in running game-server-node container"
    cmds:
      - docker exec -it {{.NODE_CONTAINER_NAME}} /bin/sh

  # ==================== Docker: clean ====================
  node:clean:
    desc: "Remove Docker image for game-server-node"
    cmds:
      - task: node:down
      - docker rmi {{.NODE_IMAGE_NAME}}:{{.NODE_IMAGE_TAG}}
    ignore_error: true

  # ==================== Linting ====================
  node:lint:
    desc: "Lint Go code with golangci-lint"
    dir: game-server-node
    cmds:
      - golangci-lint run ./...

  # ==================== Testing ====================
  node:test:
    desc: "Run fast unit tests with race detector"
    dir: game-server-node
    cmds:
      - cmd: go test -race ./...
        platforms: [linux, darwin]
      - cmd: go test ./...
        platforms: [windows]

  node:test:integration:
    desc: "Run integration tests (requires Docker daemon)"
    dir: game-server-node
    cmds:
      - cmd: go test -race -tags=integration ./tests/integration/...
        platforms: [linux, darwin]
      - cmd: go test -tags=integration ./tests/integration/...
        platforms: [windows]

  node:test:e2e:
    desc: "Run end-to-end tests (server must be running: task node:up)"
    dir: game-server-node
    cmds:
      - cmd: go test -race -tags=e2e ./tests/e2e/...
        platforms: [linux, darwin]
      - cmd: go test -tags=e2e ./tests/e2e/...
        platforms: [windows]

  # ==================== Load Testing ====================
  node:load-test:
    desc: "Run load tests against DiscoveryService (server must be running)"
    dir: game-server-node
    cmds:
      - go run ./cmd/load-test --addr localhost:{{.NODE_GRPC_PORT}} --concurrency 50 --requests 10000

  node:load-test:heavy:
    desc: "Run heavy load tests (100 concurrency, 50000 requests)"
    dir: game-server-node
    cmds:
      - go run ./cmd/load-test --addr localhost:{{.NODE_GRPC_PORT}} --concurrency 100 --requests 50000

  node:load-test:custom:
    desc: "Run load tests with custom params (requires ADDR, CONCURRENCY, REQUESTS vars)"
    dir: game-server-node
    cmds:
      - go run ./cmd/load-test --addr {{.ADDR | default "localhost:44044"}} --concurrency {{.CONCURRENCY | default 50}} --requests {{.REQUESTS | default 10000}}

  node:test:cover:
    desc: "Run unit tests and print coverage percentage"
    dir: game-server-node
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  node:test:cover-html:
    desc: "Show test coverage in default browser"
    dir: game-server-node
    cmds:
      - task: test:cover
      - go tool cover -html=coverage.out
