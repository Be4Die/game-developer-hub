version: "3"

vars:
  # Node
  NODE_IMAGE_NAME: "game-server-node"
  NODE_IMAGE_TAG: "latest"
  NODE_CONTAINER_NAME: "game-server-node"
  NODE_GRPC_PORT: 44044
  NODE_CONFIG: "local.yaml"
  NODE_API_KEY: "dev-api-key-for-local-testing"

  # Orchestrator
  ORCHESTRATOR_IMAGE_NAME: "orchestrator"
  ORCHESTRATOR_IMAGE_TAG: "latest"
  ORCHESTRATOR_CONTAINER_NAME: "orchestrator"
  ORCHESTRATOR_GRPC_PORT: 50052

  # SSO
  SSO_IMAGE_NAME: "sso"
  SSO_IMAGE_TAG: "latest"
  SSO_CONTAINER_NAME: "sso"
  SSO_GRPC_PORT: 50051

includes:
  go: taskfiles/go.yml
  docker: taskfiles/docker.yml
  loadtest: taskfiles/loadtest.yml
  frontend: taskfiles/frontend.yml

tasks:
  # ==================== Proto ====================
  proto:
    desc: "Generate Go code from proto files"
    dir: protos
    cmds:
      - task: proto:clean
      - buf generate

  proto:lint:
    desc: "Lint proto files"
    dir: protos
    cmds:
      - buf lint

  proto:clean:
    desc: "Clean generated proto files"
    dir: protos
    cmds:
      - cmd: find . -name "*.pb.go" -type f -delete
        platforms: [linux, darwin]
      - cmd: powershell -Command "Get-ChildItem -Recurse -Filter '*.pb.go' | Remove-Item -Force"
        platforms: [windows]

  # ==================== Node: Docker ====================
  node:build:
    desc: "Build Docker image for game-server-node"
    cmds:
      - task: docker:build
        vars:
          DOCKER_IMAGE_NAME: "{{.NODE_IMAGE_NAME}}"
          DOCKER_IMAGE_TAG: "{{.NODE_IMAGE_TAG}}"
          DOCKERFILE_PATH: game-server-node/Dockerfile

  node:up:
    desc: "Run game-server-node container in background"
    cmds:
      - task: docker:build
        vars:
          DOCKER_IMAGE_NAME: "{{.NODE_IMAGE_NAME}}"
          DOCKER_IMAGE_TAG: "{{.NODE_IMAGE_TAG}}"
          DOCKERFILE_PATH: game-server-node/Dockerfile
      - task: docker:up
        vars:
          DOCKER_IMAGE_NAME: "{{.NODE_IMAGE_NAME}}"
          DOCKER_IMAGE_TAG: "{{.NODE_IMAGE_TAG}}"
          DOCKER_CONTAINER_NAME: "{{.NODE_CONTAINER_NAME}}"
          DOCKER_RUN_ARGS: "-p {{.NODE_GRPC_PORT}}:{{.NODE_GRPC_PORT}} -v /var/run/docker.sock:/var/run/docker.sock -e CONFIG_PATH=/app/config/{{.NODE_CONFIG}} -e NODE_API_KEY={{.NODE_API_KEY}}"

  node:down:
    desc: "Stop and remove game-server-node container"
    cmds:
      - task: docker:down
        vars:
          DOCKER_CONTAINER_NAME: "{{.NODE_CONTAINER_NAME}}"

  node:logs:
    desc: "Show game-server-node container logs"
    cmds:
      - task: docker:logs
        vars:
          DOCKER_CONTAINER_NAME: "{{.NODE_CONTAINER_NAME}}"

  node:restart:
    desc: "Restart game-server-node container"
    cmds:
      - task: docker:restart
        vars:
          DOCKER_IMAGE_NAME: "{{.NODE_IMAGE_NAME}}"
          DOCKER_IMAGE_TAG: "{{.NODE_IMAGE_TAG}}"
          DOCKER_CONTAINER_NAME: "{{.NODE_CONTAINER_NAME}}"
          DOCKER_RUN_ARGS: "-p {{.NODE_GRPC_PORT}}:{{.NODE_GRPC_PORT}} -v /var/run/docker.sock:/var/run/docker.sock -e CONFIG_PATH=/app/config/{{.NODE_CONFIG}} -e NODE_API_KEY={{.NODE_API_KEY}}"

  node:shell:
    desc: "Open shell in running game-server-node container"
    cmds:
      - task: docker:shell
        vars:
          DOCKER_CONTAINER_NAME: "{{.NODE_CONTAINER_NAME}}"

  node:clean:
    desc: "Remove Docker image for game-server-node"
    cmds:
      - task: docker:clean
        vars:
          DOCKER_IMAGE_NAME: "{{.NODE_IMAGE_NAME}}"
          DOCKER_IMAGE_TAG: "{{.NODE_IMAGE_TAG}}"
          DOCKER_CONTAINER_NAME: "{{.NODE_CONTAINER_NAME}}"

  # ==================== Node: Go ====================
  node:lint:
    desc: "Lint Go code with golangci-lint"
    cmds:
      - task: go:lint
        vars:
          GO_DIR: game-server-node

  node:test:
    desc: "Run fast unit tests with race detector"
    cmds:
      - task: go:test
        vars:
          GO_DIR: game-server-node

  node:test:integration:
    desc: "Run integration tests (requires Docker daemon)"
    cmds:
      - task: go:test:integration
        vars:
          GO_DIR: game-server-node

  node:test:e2e:
    desc: "Run end-to-end tests (server must be running: task node:up)"
    cmds:
      - task: go:test:e2e
        vars:
          GO_DIR: game-server-node

  node:test:cover:
    desc: "Run unit tests and print coverage percentage"
    cmds:
      - task: go:test:cover
        vars:
          GO_DIR: game-server-node

  node:test:cover-html:
    desc: "Show test coverage in default browser"
    cmds:
      - task: go:test:cover-html
        vars:
          GO_DIR: game-server-node

  # ==================== Node: Load Tests ====================
  node:seed:
    desc: "Seed game-server-node with test data (requires running server)"
    dir: game-server-node
    vars:
      SEED_GAMES: "{{.SEED_GAMES | default 2}}"
      SEED_INSTANCES: "{{.SEED_INSTANCES | default 8}}"
    env:
      SEED_NODE_ADDR: '{{.NODE_ADDR | default "localhost:44044"}}'
      SEED_API_KEY: '{{.NODE_API_KEY | default "dev-api-key-for-local-testing"}}'
      SEED_GAMES: "{{.SEED_GAMES}}"
      SEED_INSTANCES: "{{.SEED_INSTANCES}}"
    cmds:
      - go run ./cmd/seed

  node:load-test:
    desc: "Run load tests against DiscoveryService (server must be running)"
    cmds:
      - task: loadtest:run
        vars:
          LOAD_TEST_DIR: game-server-node
          LOAD_TEST_ADDR: "localhost:{{.NODE_GRPC_PORT}}"

  node:load-test:heavy:
    desc: "Run heavy load tests (100 concurrency, 50000 requests)"
    cmds:
      - task: loadtest:heavy
        vars:
          LOAD_TEST_DIR: game-server-node
          LOAD_TEST_ADDR: "localhost:{{.NODE_GRPC_PORT}}"

  node:load-test:custom:
    desc: "Run load tests with custom params"
    vars:
      ADDR: '{{.ADDR | default "localhost:44044"}}'
      CONCURRENCY: "{{.CONCURRENCY | default 50}}"
      REQUESTS: "{{.REQUESTS | default 10000}}"
    cmds:
      - task: loadtest:run
        vars:
          LOAD_TEST_DIR: game-server-node
          LOAD_TEST_ADDR: "{{.ADDR}}"
          LOAD_TEST_CONCURRENCY: "{{.CONCURRENCY}}"
          LOAD_TEST_REQUESTS: "{{.REQUESTS}}"

  node:load-test:full:
    desc: "Full load test cycle: start node, run tests, cleanup"
    vars:
      NODE_CONCURRENCY: "{{.NODE_CONCURRENCY | default 50}}"
      NODE_REQUESTS: "{{.NODE_REQUESTS | default 10000}}"
    cmds:
      - echo "═══════════════════════════════════════════════════════"
      - echo "  FULL LOAD TEST CYCLE - GAME-SERVER-NODE"
      - echo "═══════════════════════════════════════════════════════"
      - task: node:up
      - |
        echo "Waiting for game-server-node..."
        for i in $(seq 1 15); do
          bash -c "echo >/dev/tcp/localhost/44044" 2>/dev/null && break
          sleep 1
        done
      - task: node:load-test
        vars:
          LOAD_TEST_CONCURRENCY: "{{.NODE_CONCURRENCY}}"
          LOAD_TEST_REQUESTS: "{{.NODE_REQUESTS}}"
      - task: node:down

  # ==================== Orchestrator: Seed ====================
  orchestrator:seed:
    desc: "Seed orchestrator with test data"
    dir: orchestrator
    vars:
      SEED_NODES: "{{.SEED_NODES | default 3}}"
      SEED_BUILDS: "{{.SEED_BUILDS | default 2}}"
      SEED_INSTANCES: "{{.SEED_INSTANCES | default 8}}"
    env:
      SEED_NODES: "{{.SEED_NODES}}"
      SEED_BUILDS: "{{.SEED_BUILDS}}"
      SEED_INSTANCES: "{{.SEED_INSTANCES}}"
      SEED_CLEAN: '{{if eq .SEED_CLEAN "true"}}1{{end}}'
      SEED_DB_HOST: localhost
      SEED_DB_PORT: "5432"
      SEED_KV_ADDR: localhost:6379
    cmds:
      - go run ./cmd/seed

  orchestrator:seed:clean:
    desc: "Clean and seed orchestrator with test data"
    dir: orchestrator
    cmds:
      - task: orchestrator:seed
        vars:
          SEED_CLEAN: "true"

  # ==================== Orchestrator: Load Tests ====================
  orchestrator:load-test:
    desc: "Run load tests against Orchestrator HTTP API (server must be running)"
    cmds:
      - >
        cd orchestrator && go run ./cmd/load-test
        --addr {{.ORCH_ADDR | default "localhost:50052"}}
        --rate {{.ORCH_RATE | default 1000}}
        --duration {{.ORCH_DURATION | default "30s"}}

  orchestrator:load-test:heavy:
    desc: "Run heavy load tests on orchestrator (10000 rps, 60s)"
    cmds:
      - cd orchestrator && go run ./cmd/load-test --heavy --addr {{.ORCH_ADDR | default "http://localhost:8080"}}

  orchestrator:load-test:seed:
    desc: "Seed test data into orchestrator for load testing"
    cmds:
      - cd orchestrator && go run ./cmd/load-test --seed-only --addr {{.ORCH_ADDR | default "http://localhost:8080"}}

  orchestrator:load-test:custom:
    desc: "Run load tests with custom params"
    vars:
      ADDR: '{{.ADDR | default "localhost:50052"}}'
      RATE: "{{.RATE | default 1000}}"
      DURATION: '{{.DURATION | default "30s"}}'
    cmds:
      - >
        cd orchestrator && go run ./cmd/load-test
        --addr {{.ADDR}}
        --rate {{.RATE}}
        --duration {{.DURATION}}

  orchestrator:load-test:full:
    desc: "Full load test cycle: start stack, seed data, run tests, cleanup"
    vars:
      ORCH_RATE: "{{.ORCH_RATE | default 1000}}"
      ORCH_DURATION: '{{.ORCH_DURATION | default "30s"}}'
    cmds:
      - echo "═══════════════════════════════════════════════════════"
      - echo "  FULL LOAD TEST CYCLE - ORCHESTRATOR"
      - echo "═══════════════════════════════════════════════════════"
      - task: orchestrator:stack:up
      - task: orchestrator:seed:clean
      - task: orchestrator:load-test
        vars:
          ORCH_RATE: "{{.ORCH_RATE}}"
          ORCH_DURATION: "{{.ORCH_DURATION}}"
      - task: orchestrator:stack:down
    status:
      - test "${SKIP_LOAD_TEST:-}" = "true"

  orchestrator:stack:up:
    desc: "Start orchestrator stack (PostgreSQL, Valkey, Orchestrator, Node)"
    dir: orchestrator
    cmds:
      - docker compose up -d --force-recreate --build
      - |
        echo "Waiting for PostgreSQL..."
        for i in $(seq 1 20); do
          docker exec orchestrator-postgres pg_isready -U postgres >/dev/null 2>&1 && break
          sleep 1
        done
      - |
        echo "Waiting for Valkey..."
        for i in $(seq 1 20); do
          docker exec orchestrator-valkey valkey-cli ping 2>/dev/null | grep -q PONG && break
          sleep 1
        done
      - |
        echo "Waiting for Orchestrator..."
        for i in $(seq 1 30); do
          bash -c "echo >/dev/tcp/localhost/50052" 2>/dev/null && break
          sleep 1
        done
      - echo "✅ Stack is ready"

  orchestrator:stack:down:
    desc: "Stop orchestrator stack"
    dir: orchestrator
    cmds:
      - docker compose down --remove-orphans
      - docker stop game-server-node 2>/dev/null || true
      - docker rm game-server-node 2>/dev/null || true

  orchestrator:stack:logs:
    desc: "Show orchestrator stack logs"
    dir: orchestrator
    cmds:
      - docker compose logs -f

  # ==================== Orchestrator: Docker ====================
  orchestrator:db:init:
    desc: "Initialize orchestrator database schema"
    dir: orchestrator
    cmds:
      - |
        docker exec -i {{.DB_CONTAINER}} psql -U postgres -d orchestrator < migrations/init.sql
      - echo "✅ Database schema initialized"
    vars:
      DB_CONTAINER: '{{.DB_CONTAINER | default "orchestrator-postgres"}}'

  orchestrator:db:reset:
    desc: "Reset orchestrator database (drop and recreate)"
    dir: orchestrator
    vars:
      DB_CONTAINER: '{{.DB_CONTAINER | default "orchestrator-postgres"}}'
    cmds:
      - docker exec {{.DB_CONTAINER}} psql -U postgres -c "DROP DATABASE IF EXISTS orchestrator;"
      - docker exec {{.DB_CONTAINER}} psql -U postgres -c "CREATE DATABASE orchestrator;"
      - task: orchestrator:db:init
        vars:
          DB_CONTAINER: "{{.DB_CONTAINER}}"

  orchestrator:build:
    desc: "Build Docker image for orchestrator"
    cmds:
      - task: docker:build
        vars:
          DOCKER_IMAGE_NAME: "{{.ORCHESTRATOR_IMAGE_NAME}}"
          DOCKER_IMAGE_TAG: "{{.ORCHESTRATOR_IMAGE_TAG}}"
          DOCKERFILE_PATH: orchestrator/Dockerfile

  orchestrator:up:
    desc: "Run orchestrator container in background"
    cmds:
      - task: docker:build
        vars:
          DOCKER_IMAGE_NAME: "{{.ORCHESTRATOR_IMAGE_NAME}}"
          DOCKER_IMAGE_TAG: "{{.ORCHESTRATOR_IMAGE_TAG}}"
          DOCKERFILE_PATH: orchestrator/Dockerfile
      - task: docker:up
        vars:
          DOCKER_IMAGE_NAME: "{{.ORCHESTRATOR_IMAGE_NAME}}"
          DOCKER_IMAGE_TAG: "{{.ORCHESTRATOR_IMAGE_TAG}}"
          DOCKER_CONTAINER_NAME: "{{.ORCHESTRATOR_CONTAINER_NAME}}"
          DOCKER_RUN_ARGS: "-p {{.ORCHESTRATOR_GRPC_PORT}}:{{.ORCHESTRATOR_GRPC_PORT}}"

  orchestrator:down:
    desc: "Stop and remove orchestrator container"
    cmds:
      - task: docker:down
        vars:
          DOCKER_CONTAINER_NAME: "{{.ORCHESTRATOR_CONTAINER_NAME}}"

  orchestrator:logs:
    desc: "Show orchestrator container logs"
    cmds:
      - task: docker:logs
        vars:
          DOCKER_CONTAINER_NAME: "{{.ORCHESTRATOR_CONTAINER_NAME}}"

  orchestrator:restart:
    desc: "Restart orchestrator container"
    cmds:
      - task: docker:restart
        vars:
          DOCKER_IMAGE_NAME: "{{.ORCHESTRATOR_IMAGE_NAME}}"
          DOCKER_IMAGE_TAG: "{{.ORCHESTRATOR_IMAGE_TAG}}"
          DOCKER_CONTAINER_NAME: "{{.ORCHESTRATOR_CONTAINER_NAME}}"
          DOCKER_RUN_ARGS: "-p {{.ORCHESTRATOR_GRPC_PORT}}:{{.ORCHESTRATOR_GRPC_PORT}}"

  orchestrator:shell:
    desc: "Open shell in running orchestrator container"
    cmds:
      - task: docker:shell
        vars:
          DOCKER_CONTAINER_NAME: "{{.ORCHESTRATOR_CONTAINER_NAME}}"

  orchestrator:clean:
    desc: "Remove Docker image for orchestrator"
    cmds:
      - task: docker:clean
        vars:
          DOCKER_IMAGE_NAME: "{{.ORCHESTRATOR_IMAGE_NAME}}"
          DOCKER_IMAGE_TAG: "{{.ORCHESTRATOR_IMAGE_TAG}}"
          DOCKER_CONTAINER_NAME: "{{.ORCHESTRATOR_CONTAINER_NAME}}"

  # ==================== Orchestrator: Go ====================
  orchestrator:lint:
    desc: "Lint Go code with golangci-lint"
    cmds:
      - task: go:lint
        vars:
          GO_DIR: orchestrator

  orchestrator:test:
    desc: "Run fast unit tests with race detector"
    cmds:
      - task: go:test
        vars:
          GO_DIR: orchestrator

  orchestrator:test:integration:
    desc: "Run integration tests (requires Docker daemon)"
    cmds:
      - task: go:test:integration
        vars:
          GO_DIR: orchestrator

  orchestrator:test:e2e:
    desc: "Run end-to-end tests (server must be running: task orchestrator:up)"
    cmds:
      - task: go:test:e2e
        vars:
          GO_DIR: orchestrator

  orchestrator:test:cover:
    desc: "Run unit tests and print coverage percentage"
    cmds:
      - task: go:test:cover
        vars:
          GO_DIR: orchestrator

  orchestrator:test:cover-html:
    desc: "Show test coverage in default browser"
    cmds:
      - task: go:test:cover-html
        vars:
          GO_DIR: orchestrator

  # ==================== SSO ====================
  sso:build:
    desc: "Build Docker image for SSO service"
    cmds:
      - task: docker:build
        vars:
          DOCKER_IMAGE_NAME: "{{.SSO_IMAGE_NAME}}"
          DOCKER_IMAGE_TAG: "{{.SSO_IMAGE_TAG}}"
          DOCKERFILE_PATH: sso/Dockerfile

  sso:up:
    desc: "Start SSO stack (PostgreSQL, Valkey, SSO)"
    dir: sso
    cmds:
      - docker compose up -d --build
      - |
        echo "Ожидание PostgreSQL..."
        for i in $(seq 1 20); do
          docker exec sso-postgres pg_isready -U postgres >/dev/null 2>&1 && break
          sleep 1
        done
      - |
        echo "Ожидание Valkey..."
        for i in $(seq 1 20); do
          docker exec sso-valkey valkey-cli ping 2>/dev/null | grep -q PONG && break
          sleep 1
        done
      - 'echo "SSO stack is ready"'

  sso:down:
    desc: "Stop SSO stack"
    dir: sso
    cmds:
      - docker compose down --remove-orphans

  sso:logs:
    desc: "Show SSO service logs"
    dir: sso
    cmds:
      - docker compose logs -f {{.SERVICE | default "sso"}}

  sso:restart:
    desc: "Rebuild and restart SSO service"
    dir: sso
    cmds:
      - docker compose up -d --build --force-recreate

  sso:db:init:
    desc: "Initialize SSO database schema"
    dir: sso
    cmds:
      - |
        docker exec -i sso-postgres psql -U postgres -d sso < migrations/init.sql
      - echo "✅ SSO database schema initialized"

  sso:db:reset:
    desc: "Reset SSO database (drop and recreate)"
    dir: sso
    cmds:
      - docker exec sso-postgres psql -U postgres -c "DROP DATABASE IF EXISTS sso;"
      - docker exec sso-postgres psql -U postgres -c "CREATE DATABASE sso;"
      - task: sso:db:init

  sso:lint:
    desc: "Lint SSO Go code with golangci-lint"
    cmds:
      - task: go:lint
        vars:
          GO_DIR: sso

  sso:test:
    desc: "Run SSO unit tests with race detector"
    cmds:
      - task: go:test
        vars:
          GO_DIR: sso

  sso:test:cover:
    desc: "Run SSO tests and print coverage percentage"
    cmds:
      - task: go:test:cover
        vars:
          GO_DIR: sso

  sso:test:cover-html:
    desc: "Show SSO test coverage in browser"
    cmds:
      - task: go:test:cover-html
        vars:
          GO_DIR: sso

  sso:shell:
    desc: "Open shell in running SSO container"
    dir: sso
    cmds:
      - docker compose exec sso sh

  # ==================== SSO: Seed & Load Tests ====================
  sso:seed:
    desc: "Seed SSO with test users (requires running server)"
    dir: sso
    vars:
      SEED_USERS: "{{.SEED_USERS | default 10}}"
      SEED_ADMINS: "{{.SEED_ADMINS | default 1}}"
    env:
      SEED_SSO_ADDR: '{{.SSO_ADDR | default "localhost:50051"}}'
      SEED_USERS: "{{.SEED_USERS}}"
      SEED_ADMINS: "{{.SEED_ADMINS}}"
    cmds:
      - go run ./cmd/seed

  sso:load-test:
    desc: "Run load tests against SSO gRPC API (server must be running)"
    dir: sso
    cmds:
      - >
        go run ./cmd/load-test
        --addr {{.SSO_ADDR | default "localhost:50051"}}
        --concurrency {{.SSO_CONCURRENCY | default 50}}
        --requests {{.SSO_REQUESTS | default 10000}}

  sso:load-test:heavy:
    desc: "Run heavy load tests (100 concurrency, 50000 requests)"
    dir: sso
    cmds:
      - go run ./cmd/load-test --addr {{.SSO_ADDR | default "localhost:50051"}} --heavy

  sso:load-test:auth:
    desc: "Run load tests against SSO AuthService only"
    dir: sso
    cmds:
      - >
        go run ./cmd/load-test
        --addr {{.SSO_ADDR | default "localhost:50051"}}
        --concurrency {{.SSO_CONCURRENCY | default 50}}
        --requests {{.SSO_REQUESTS | default 10000}}
        --service auth

  sso:load-test:token:
    desc: "Run load tests against SSO TokenService only"
    dir: sso
    cmds:
      - >
        go run ./cmd/load-test
        --addr {{.SSO_ADDR | default "localhost:50051"}}
        --concurrency {{.SSO_CONCURRENCY | default 50}}
        --requests {{.SSO_REQUESTS | default 10000}}
        --service token

  sso:load-test:user:
    desc: "Run load tests against SSO UserService only"
    dir: sso
    cmds:
      - >
        go run ./cmd/load-test
        --addr {{.SSO_ADDR | default "localhost:50051"}}
        --concurrency {{.SSO_CONCURRENCY | default 50}}
        --requests {{.SSO_REQUESTS | default 10000}}
        --service user

  sso:load-test:custom:
    desc: "Run load tests with custom params"
    vars:
      ADDR: '{{.ADDR | default "localhost:50051"}}'
      CONCURRENCY: "{{.CONCURRENCY | default 50}}"
      REQUESTS: "{{.REQUESTS | default 10000}}"
    cmds:
      - >
        cd sso && go run ./cmd/load-test
        --addr {{.ADDR}}
        --concurrency {{.CONCURRENCY}}
        --requests {{.REQUESTS}}

  sso:load-test:full:
    desc: "Full load test cycle: start SSO stack, seed, run tests, cleanup"
    vars:
      SSO_CONCURRENCY: "{{.SSO_CONCURRENCY | default 50}}"
      SSO_REQUESTS: "{{.SSO_REQUESTS | default 10000}}"
    cmds:
      - echo "==================================================="
      - echo "  FULL LOAD TEST CYCLE - SSO"
      - echo "==================================================="
      - task: sso:up
      - |
        echo "Waiting for SSO gRPC..."
        for i in $(seq 1 30); do
          bash -c "echo >/dev/tcp/localhost/50051" 2>/dev/null && break
          sleep 1
        done
      - task: sso:seed
      - task: sso:load-test
        vars:
          SSO_CONCURRENCY: "{{.SSO_CONCURRENCY}}"
          SSO_REQUESTS: "{{.SSO_REQUESTS}}"
      - task: sso:down

  # ==================== Frontend ====================
  frontend:install:
    desc: "Install frontend dependencies"
    cmds:
      - task: frontend:deps
        vars:
          FRONTEND_DIR: frontend

  frontend:dev:
    desc: "Start frontend development server"
    cmds:
      - task: frontend:start
        vars:
          FRONTEND_DIR: frontend

  frontend:build:
    desc: "Build frontend for production"
    cmds:
      - task: frontend:prod
        vars:
          FRONTEND_DIR: frontend

  frontend:preview:
    desc: "Preview frontend production build"
    cmds:
      - task: frontend:serve
        vars:
          FRONTEND_DIR: frontend

  frontend:clean:
    desc: "Clean frontend build artifacts"
    cmds:
      - task: frontend:remove
        vars:
          FRONTEND_DIR: frontend

  frontend:cloc:
    desc: "Count lines of code in frontend"
    cmds:
      - task: frontend:stats
        vars:
          FRONTEND_DIR: frontend

  # ==================== Stack (deployments/) ====================
  stack:up:
    desc: "Start full stack via docker compose (Postgres, Valkey, Orchestrator, SSO, Node, Frontend)"
    dir: deployments
    cmds:
      - docker compose up -d --build
      - |
        echo "Ожидание PostgreSQL..."
        for i in $(seq 1 20); do
          docker exec gdh-postgres pg_isready -U postgres >/dev/null 2>&1 && break
          sleep 1
        done
      - |
        echo "Ожидание Valkey..."
        for i in $(seq 1 20); do
          docker exec gdh-valkey valkey-cli ping 2>/dev/null | grep -q PONG && break
          sleep 1
        done
      - |
        echo "Ожидание Orchestrator..."
        for i in $(seq 1 30); do
          bash -c "echo >/dev/tcp/localhost/50052" 2>/dev/null && break
          sleep 1
        done
      - 'echo "Stack is ready: http://localhost:3000 (frontend), :50052 (Orchestrator gRPC), :50051 (SSO)"'

  stack:down:
    desc: "Stop full stack and remove containers"
    dir: deployments
    cmds:
      - docker compose down --remove-orphans

  stack:logs:
    desc: "Follow logs for all stack services"
    dir: deployments
    cmds:
      - docker compose logs -f

  stack:rebuild:
    desc: "Rebuild and restart all stack services"
    dir: deployments
    cmds:
      - docker compose up -d --build --force-recreate

  stack:db:init:
    desc: "Initialize orchestrator database schema (run after stack:up)"
    cmds:
      - |
        docker exec -i gdh-postgres psql -U postgres -d orchestrator < orchestrator/migrations/init.sql
      - echo "✅ Database schema initialized"

  stack:db:reset:
    desc: "Reset orchestrator database (drop, recreate, init)"
    cmds:
      - docker exec gdh-postgres psql -U postgres -c "DROP DATABASE IF EXISTS orchestrator;"
      - docker exec gdh-postgres psql -U postgres -c "CREATE DATABASE orchestrator;"
      - task: stack:db:init

  stack:seed:
    desc: "Seed orchestrator with test data (requires running stack)"
    dir: orchestrator
    vars:
      SEED_NODES: "{{.SEED_NODES | default 2}}"
      SEED_BUILDS: "{{.SEED_BUILDS | default 2}}"
      SEED_INSTANCES: "{{.SEED_INSTANCES | default 4}}"
    env:
      SEED_NODES: "{{.SEED_NODES}}"
      SEED_BUILDS: "{{.SEED_BUILDS}}"
      SEED_INSTANCES: "{{.SEED_INSTANCES}}"
      SEED_DB_HOST: localhost
      SEED_DB_PORT: "5432"
      SEED_KV_ADDR: localhost:6379
    cmds:
      - go run ./cmd/seed

  # ==================== Dev (orchestrator stack + frontend dev server) ====================
  dev:
    desc: "Start orchestrator infra (Postgres, Valkey, Orchestrator, Node) + frontend dev server"
    cmds:
      - task: stack:up
      - task: stack:db:init
      - task: frontend:dev

  # ==================== All services (legacy single containers) ====================
  all:up:
    desc: "Start all services as individual containers"
    cmds:
      - task: node:up
      - task: orchestrator:up

  all:down:
    desc: "Stop all services"
    cmds:
      - task: node:down
      - task: orchestrator:down

  all:restart:
    desc: "Restart all services"
    cmds:
      - task: node:restart
      - task: orchestrator:restart

  all:logs:
    desc: "Show logs for all services"
    cmds:
      - task: node:logs
      - task: orchestrator:logs

  all:test:
    desc: "Run all tests"
    cmds:
      - task: node:test
      - task: orchestrator:test

  all:lint:
    desc: "Lint all code"
    cmds:
      - task: node:lint
      - task: orchestrator:lint
      - task: sso:lint
      - task: proto:lint

  all:cloc:
    desc: "Count lines of code (excluding node_modules, generated proto)"
    cmds:
      - cloc --exclude-dir=node_modules,.git --exclude-ext=json,lock --not-match-f='\.pb\.go$|_grpc\.pb\.go$' .
